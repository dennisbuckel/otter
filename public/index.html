<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Viewport + PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OTTER" />
    <meta name="theme-color" content="#FC4C02" />

    <!-- Meta -->
    <meta name="description" content="OTTER Challenge – privates Wettkampf-Tracking und Social Network" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <title>OTTER Challenge</title>

    <style>
      /* Kritisches CSS – verhindert FOUC */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background-color: #F4F4F6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      /* Ladescreen */
      #splash {
        position: fixed; inset: 0;
        background: #FC4C02;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-family: 'Inter', sans-serif;
        font-size: 3rem; font-weight: 900;
        color: white; letter-spacing: 0.1em;
      }
      #splash-sub {
        color: rgba(255,255,255,0.75);
        font-size: 0.85rem; font-weight: 500;
        margin-top: 6px; letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <noscript>Du musst JavaScript aktivieren, um OTTER zu nutzen.</noscript>

    <!-- Splash Screen -->
    <div id="splash">
      <div id="splash-logo">🏆 OTTER</div>
      <div id="splash-sub">CHALLENGE · YEAR 2</div>
    </div>

    <div id="root"></div>

    <!-- Splash ausblenden wenn App bereit -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 450);
          }
        }, 600);
      });
    </script>
  </body>
</html>
